<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>型得你 — Avatar 創建</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Serif TC', 'Noto Sans TC', serif;
  background: #F5F0E8;
  color: #2C2416;
  -webkit-font-smoothing: antialiased;
  max-width: 390px;
  margin: 0 auto;
  padding: 48px 24px 40px;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.sub {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  color: #B8944B;
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}

.section-label {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #B8944B;
  margin-bottom: 12px;
}

/* Preview */
.preview-row {
  display: flex;
  gap: 20px;
  align-items: center;
  margin-bottom: 32px;
}
.preview-large {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: #EDE5D8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}
.preview-bitmoji {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: #EDE5D8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.preview-label {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  color: #6B5E4A;
  margin-top: 4px;
  text-align: center;
}

/* Character Grid */
.char-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}
.char-item {
  aspect-ratio: 1;
  border-radius: 12px;
  background: #EDE5D8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}
.char-item.selected {
  border-color: #A04030;
  background: #FFF8F0;
}

/* Option rows */
.option-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.option-chip {
  padding: 8px 16px;
  border-radius: 20px;
  background: #EDE5D8;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  color: #2C2416;
  cursor: pointer;
  border: 2px solid transparent;
}
.option-chip.selected {
  border-color: #A04030;
  background: #FFF8F0;
}
.option-chip.color {
  width: 32px; height: 32px;
  padding: 0;
  border-radius: 50%;
}

.color-swatch {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: inline-block;
  border: 2px solid transparent;
  cursor: pointer;
}
.color-swatch.selected {
  border-color: #A04030;
}

.color-1 { background: #2C2416; }
.color-2 { background: #A04030; }
.color-3 { background: #B8944B; }
.color-4 { background: #F5F0E8; border: 1px solid #D4C9B0; }
.color-5 { background: #4A6FA5; }

.cta {
  width: 100%;
  padding: 16px;
  background: #A04030;
  color: #F5F0E8;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  margin-top: 12px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>創建你的化身</h1>
<div class="sub">— Avatar · 自省錄 —</div>

<!-- Preview -->
<div class="preview-row">
  <div>
    <div class="preview-large">🧑</div>
    <div class="preview-label">大樣</div>
  </div>
  <div>
    <div class="preview-bitmoji">🧑</div>
    <div class="preview-label">Bitmoji</div>
  </div>
</div>

<!-- Step 1: Choose Character -->
<div class="section-label">— 揀角色 —</div>
<div class="char-grid">
  <div class="char-item selected">🧑</div>
  <div class="char-item">👩</div>
  <div class="char-item">👨</div>
  <div class="char-item">🧓</div>
  <div class="char-item">👩‍🦱</div>
  <div class="char-item">🦊</div>
  <div class="char-item">🐱</div>
  <div class="char-item">🐶</div>
  <div class="char-item">🐰</div>
  <div class="char-item">🐻</div>
  <div class="char-item">🦁</div>
  <div class="char-item">🐯</div>
  <div class="char-item">🦉</div>
  <div class="char-item">🐧</div>
  <div class="char-item">🐭</div>
  <div class="char-item">🦄</div>
  <div class="char-item">🐨</div>
  <div class="char-item">🦋</div>
  <div class="char-item">🐢</div>
  <div class="char-item">🐝</div>
  <div class="char-item">🦌</div>
  <div class="char-item">🐿️</div>
  <div class="char-item">🦢</div>
  <div class="char-item">🐈</div>
  <div class="char-item">🦮</div>
  <div class="char-item">🐇</div>
  <div class="char-item">🦝</div>
  <div class="char-item">🐕</div>
  <div class="char-item">🦩</div>
  <div class="char-item">🐄</div>
</div>

<!-- Step 2: Expression -->
<div class="section-label">— 表情 —</div>
<div class="option-row">
  <div class="option-chip selected">😊 開心</div>
  <div class="option-chip">😌 平靜</div>
  <div class="option-chip">🤔 思考</div>
  <div class="option-chip">🙂 微笑</div>
  <div class="option-chip">😎 自信</div>
</div>

<!-- Step 3: Hair / Accessory -->
<div class="section-label">— 頭髮 / 配件 —</div>
<div class="option-row">
  <div class="option-chip selected">短髮</div>
  <div class="option-chip">長髮</div>
  <div class="option-chip">束髮</div>
  <div class="option-chip">自然</div>
  <div class="option-chip">帽</div>
</div>

<!-- Step 4: Color -->
<div class="section-label">— 主色 —</div>
<div class="option-row">
  <span class="color-swatch selected color-1"></span>
  <span class="color-swatch color-2"></span>
  <span class="color-swatch color-3"></span>
  <span class="color-swatch color-4"></span>
  <span class="color-swatch color-5"></span>
</div>

<!-- Step 5: Clothing -->
<div class="section-label">— 服裝 —</div>
<div class="option-row">
  <div class="option-chip selected">裇衫</div>
  <div class="option-chip">毛衣</div>
  <div class="option-chip">外套</div>
  <div class="option-chip">長袍</div>
  <div class="option-chip">簡約</div>
</div>

<button class="cta">完成 · 存入化身</button>

</body>
</html>
