<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>@typingself — Borderless Design Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #FAFAFA;
  color: #2A2D34;
  -webkit-font-smoothing: antialiased;
  max-width: 390px;
  margin: 0 auto;
}

/* ─── Status Bar ─── */
.status-bar {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px 8px;
  font-size: 12px;
  font-weight: 600;
  color: #2A2D34;
}

/* ─── App Header ─── */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px 12px;
}
.app-header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  font-weight: 700;
  color: #2A2D34;
}
.app-header span {
  font-size: 13px;
  color: #9CA3AF;
}

/* ─── Reading Goal ─── */
.reading-goal {
  background: white;
  padding: 20px;
  margin: 0;
}
.reading-goal .title-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.reading-goal h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 700;
  color: #2A2D34;
}
.reading-goal .minutes {
  font-size: 15px;
  font-weight: 500;
  color: #333333;
}
.reading-goal .stats {
  display: flex;
  gap: 24px;
}
.reading-goal .stat {
  text-align: center;
}
.reading-goal .stat .number {
  font-size: 20px;
  font-weight: 700;
  color: #2A2D34;
}
.reading-goal .stat .label {
  font-size: 11px;
  color: #9CA3AF;
  margin-top: 2px;
}

/* ─── Separator ─── */
.separator {
  height: 8px;
  background: #F4F5F6;
}

/* ─── Filter Tabs ─── */
.filter-tabs {
  display: flex;
  gap: 0;
  padding: 0 0;
  background: white;
}
.filter-tab {
  flex: 1;
  padding: 14px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: #9CA3AF;
  border-bottom: 2px solid transparent;
}
.filter-tab.active {
  color: #73A5C5;
  border-bottom: 2px solid #73A5C5;
  font-weight: 600;
}

/* ─── Book Items ─── */
.book-item {
  background: white;
  padding: 16px 20px;
}
.book-item .row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.book-item .icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.book-item .info { flex: 1; }
.book-item .info .title {
  font-size: 16px;
  font-weight: 600;
  color: #2A2D34;
}
.book-item .info .subtitle {
  font-size: 13px;
  color: #333333;
  margin-top: 2px;
  line-height: 1.4;
}
.book-item .tag {
  font-size: 10px;
  font-weight: 600;
  color: #73A5C5;
  letter-spacing: 0.05em;
}
.book-item .divider {
  height: 1px;
  background: #E5E7EB;
  margin-top: 16px;
}

/* ─── Bottom Nav ─── */
.bottom-nav {
  display: flex;
  background: white;
  border-top: 1px solid #E5E7EB;
  padding: 6px 0 12px;
  position: fixed;
  bottom: 0;
  width: 390px;
  max-width: 100%;
}
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 10px;
  color: #9CA3AF;
  padding: 4px 0;
}
.nav-item .icon {
  font-size: 20px;
  margin-bottom: 2px;
}
.nav-item.active {
  color: #73A5C5;
  font-weight: 600;
}
.nav-item.active .icon { color: #73A5C5; }

/* ─── Spacer for fixed nav ─── */
.spacer { height: 60px; }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span>9:41</span>
  <span>🔋 77%</span>
</div>

<!-- App Header -->
<div class="app-header">
  <h1>型得你</h1>
  <span>書架</span>
</div>

<!-- Reading Goal Card (Borderless) -->
<div class="reading-goal">
  <div class="title-row">
    <h2>本週閱讀目標</h2>
    <span class="minutes">0 / 60 分鐘</span>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="number">0.0h</div>
      <div class="label">閱讀時數</div>
    </div>
    <div class="stat">
      <div class="number">2/18</div>
      <div class="label">完成進度</div>
    </div>
    <div class="stat">
      <div class="number">0 天</div>
      <div class="label">連續閱讀</div>
    </div>
  </div>
</div>

<!-- Separator -->
<div class="separator"></div>

<!-- Filter Tabs -->
<div class="filter-tabs">
  <div class="filter-tab active">全部</div>
  <div class="filter-tab">進行中</div>
  <div class="filter-tab">已完成</div>
  <div class="filter-tab">未開</div>
</div>

<!-- Separator -->
<div class="separator"></div>

<!-- Book Items (Borderless) -->
<div class="book-item">
  <div class="row">
    <div class="icon" style="background:#F0F7FF;">⭐</div>
    <div class="info">
      <div class="title">高級KAM L</div>
      <div class="subtitle">ENFJ — 用溫暖改變世界嘅領袖</div>
    </div>
    <span class="tag">MBTI</span>
  </div>
  <div class="divider"></div>
</div>

<div class="book-item">
  <div class="row">
    <div class="icon" style="background:#F5F0FF;">🌙</div>
    <div class="info">
      <div class="title">靈性導師</div>
      <div class="subtitle">INFJ — 用直覺看透世界嘅夢想家</div>
    </div>
    <span class="tag">MBTI</span>
  </div>
  <div class="divider"></div>
</div>

<div class="book-item">
  <div class="row">
    <div class="icon" style="background:#F0F7FF;">♟️</div>
    <div class="info">
      <div class="title">戰略家</div>
      <div class="subtitle">INTJ — 用策略征服世界嘅獨行俠</div>
    </div>
    <span class="tag">MBTI</span>
  </div>
  <div class="divider"></div>
</div>

<div class="book-item">
  <div class="row">
    <div class="icon" style="background:#FFF8F0;">🌍</div>
    <div class="info">
      <div class="title">擁抱你的陰影</div>
      <div class="subtitle">Shadow Work 入門指南</div>
    </div>
    <span class="tag">Growth</span>
  </div>
  <div class="divider"></div>
</div>

<div class="spacer"></div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active">
    <div class="icon">📚</div>
    <span>書架</span>
  </div>
  <div class="nav-item">
    <div class="icon">🔍</div>
    <span>探索</span>
  </div>
  <div class="nav-item">
    <div class="icon">💬</div>
    <span>動態</span>
  </div>
  <div class="nav-item">
    <div class="icon">👤</div>
    <span>我</span>
  </div>
</div>

</body>
</html>
