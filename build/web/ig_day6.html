<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111;font-family:'Noto Sans TC',sans-serif}
.post{width:576px;height:1024px;background:linear-gradient(180deg,#1a1a1a 0%,#2a1a1a 50%,#1a1a1a 100%);position:relative;overflow:hidden;border-radius:20px}
.brain{position:absolute;top:40px;right:40px;font-size:48px;opacity:.3}
.line{position:absolute;left:40px;top:120px;width:60px;height:3px;background:#c97b5d;border-radius:2px}
.title{position:absolute;left:40px;top:160px;right:40px;color:#f0e6dc;font-size:38px;font-weight:900;line-height:1.4}
.title .h{color:#c97b5d}
.sub{position:absolute;left:40px;top:380px;right:40px;color:#b8a89c;font-size:20px;line-height:2}
.sub .t{color:#c97b5d;font-weight:700}
.q{position:absolute;left:40px;top:320px;font-size:60px;opacity:.15;color:#c97b5d;font-weight:900}
.brand{position:absolute;bottom:50px;left:40px;right:40px;display:flex;justify-content:space-between}
.bn{color:#f0e6dc;font-size:18px;font-weight:700;letter-spacing:2px}
.bt{color:#8a7a6e;font-size:13px}
</style></head><body>
<div class="post">

<div class="q">Shadow</div>
<div class="title">你今日有冇<br><span class="h">戴面具</span>？</div>
<div class="sub">
職場上既你 vs 真實既你<br>
社交中既你 vs 獨處時既你<br><br>
你既Persona（面具）係點樣？<br>
你既Shadow（陰影）又壓抑咗咩？<br><br>
<span class="t">型得你</span>幫你detect
</div>
<div class="brand"><span class="bn">型得你</span><span class="bt">#ShadowWork</span></div>
</div></body></html>
