<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111;font-family:'Noto Sans TC',sans-serif}
.post{width:576px;height:1024px;background:linear-gradient(180deg,#1a1a1a 0%,#1a2a1a 50%,#1a1a1a 100%);position:relative;overflow:hidden;border-radius:20px}
.brain{position:absolute;top:40px;right:40px;font-size:48px;opacity:.3}
.line{position:absolute;left:40px;top:120px;width:60px;height:3px;background:#8fa87a;border-radius:2px}
.title{position:absolute;left:40px;top:160px;right:40px;color:#f0e6dc;font-size:36px;font-weight:900;line-height:1.4}
.title .h{color:#8fa87a}
.sub{position:absolute;left:40px;top:400px;right:40px;color:#b8a89c;font-size:18px;line-height:1.8}
.sub .t{color:#8fa87a;font-weight:700}
.brand{position:absolute;bottom:50px;left:40px;right:40px;display:flex;justify-content:space-between}
.bn{color:#f0e6dc;font-size:18px;font-weight:700;letter-spacing:2px}
.bt{color:#8a7a6e;font-size:13px}
</style></head><body>
<div class="post">
<div class="brain">🧠</div><div class="line"></div>
<div class="title">了解自己<br>唔係一個<span class="h">type</span><br>咁簡單</div>
<div class="sub">
做過MBTI test之後呢？<br>
俾咗你一個type之後呢？<br><br>
<span class="t">型得你</span>帶你行4個Stage：<br>
了解自己 → 面具陰影 → 發展劣勢 → Self<br><br>
由test開始，唔係由test結束。</div>
<div class="brand"><span class="bn">型得你</span><span class="bt">#了解自己唔係一個type咁簡單</span></div>
</div></body></html>
